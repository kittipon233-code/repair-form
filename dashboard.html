<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard บันทึกการซ่อม</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Sarabun',sans-serif;background:#f5f5f0;padding:16px;color:#222}
    .db-header{margin-bottom:1.5rem}
    .db-title{font-size:20px;font-weight:500;color:#222}
    .db-sub{font-size:12px;color:#888;margin-top:3px}
    .cards{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1rem}
    .card{background:#f0f0ea;border-radius:10px;padding:14px 16px}
    .card-lbl{font-size:11px;color:#888;margin-bottom:6px}
    .card-num{font-size:28px;font-weight:500}
    .card-sub{font-size:11px;color:#aaa;margin-top:3px}
    .num-blue{color:#378ADD}
    .num-red{color:#E24B4A}
    .num-green{color:#639922}
    .section{background:#fff;border:0.5px solid #e0e0e0;border-radius:12px;padding:16px;margin-bottom:12px}
    .sec-title{font-size:11px;font-weight:500;color:#888;letter-spacing:0.05em;text-transform:uppercase;margin-bottom:14px}
    .pending-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:0.5px solid #f0f0f0}
    .pending-item:last-child{border-bottom:none;padding-bottom:0}
    .dot{width:7px;height:7px;border-radius:50%;background:#E24B4A;margin-top:6px;flex-shrink:0}
    .p-loc{font-size:14px;font-weight:500;color:#222}
    .p-detail{font-size:12px;color:#666;margin-top:2px}
    .p-date{font-size:11px;color:#aaa;margin-top:2px}
    .badge{display:inline-block;font-size:10px;padding:2px 7px;border-radius:4px;font-weight:500;margin-left:6px}
    .badge-p{background:#FCEBEB;color:#A32D2D}
    .charts-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
    .month-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
    .month-lbl{font-size:12px;color:#666;width:90px;flex-shrink:0}
    .bar-wrap{flex:1;height:18px;background:#f0f0f0;border-radius:4px;overflow:hidden;display:flex}
    .bar-done{height:100%;background:#639922}
    .bar-pend{height:100%;background:#E24B4A}
    .month-cnt{font-size:11px;color:#aaa;width:28px;text-align:right;flex-shrink:0}
    .legend{display:flex;gap:14px;margin-top:10px;font-size:11px;color:#888}
    .leg-dot{width:10px;height:10px;border-radius:2px;margin-right:4px;display:inline-block}
    .loading{text-align:center;padding:60px;color:#888;font-size:14px}
    .no-pending{text-align:center;padding:16px;color:#639922;font-size:13px}
    @media(max-width:400px){
      .charts-row{grid-template-columns:1fr}
      .card-num{font-size:22px}
    }
  </style>
</head>
<body>

<div id="loading" class="loading">⏳ กำลังโหลดข้อมูล...</div>

<div id="content" style="display:none">

  <div class="db-header">
    <div class="db-title">Dashboard บันทึกการซ่อม</div>
    <div class="db-sub" id="last-update"></div>
  </div>

  <div class="cards">
    <div class="card">
      <div class="card-lbl">ทั้งหมด</div>
      <div class="card-num num-blue" id="total-all">0</div>
      <div class="card-sub">รายการ</div>
    </div>
    <div class="card">
      <div class="card-lbl">งานค้าง</div>
      <div class="card-num num-red" id="total-pending">0</div>
      <div class="card-sub">รอดำเนินการ</div>
    </div>
    <div class="card">
      <div class="card-lbl">เสร็จสิ้น</div>
      <div class="card-num num-green" id="total-done">0</div>
      <div class="card-sub" id="pct-done">0%</div>
    </div>
  </div>

  <div class="section">
    <div class="sec-title">งานค้างทั้งหมด</div>
    <div id="no-pending" class="no-pending" style="display:none">✅ ไม่มีงานค้าง</div>
    <div id="pending-list"></div>
  </div>

  <div class="charts-row">
    <div class="section">
      <div class="sec-title">แยกตาม Zone</div>
      <div style="position:relative;height:180px">
        <canvas id="zoneChart" role="img" aria-label="กราฟแท่งจำนวนการซ่อมแยกตาม Zone">จำนวนการซ่อมแยก Zone</canvas>
      </div>
    </div>
    <div class="section">
      <div class="sec-title">แยกตามประเภท</div>
      <div style="position:relative;height:180px">
        <canvas id="typeChart" role="img" aria-label="กราฟวงกลมแยกตามประเภทการซ่อม">ประเภทการซ่อม</canvas>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="sec-title">สรุปรายเดือน</div>
    <div id="month-bars"></div>
    <div class="legend">
      <span><span class="leg-dot" style="background:#639922"></span>เสร็จสิ้น</span>
      <span><span class="leg-dot" style="background:#E24B4A"></span>งานค้าง</span>
    </div>
  </div>

</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxqnahlgOcIiMey3_Lpz7tpuek_cQwcyIuW2gkuIT7GKpucx-BFkQVRmsPg0CE8yybB8w/exec';

function formatDate(d) {
  try { return new Date(d).toLocaleDateString('th-TH'); } catch(e) { return d; }
}

window.onload = async () => {
  try {
    const res  = await fetch(GAS_URL + '?action=getDashboard');
    const json = await res.json();
    if (json.status === 'ok') render(json.data);
    else document.getElementById('loading').textContent = '❌ โหลดข้อมูลไม่ได้';
  } catch(e) {
    document.getElementById('loading').textContent = '❌ เกิดข้อผิดพลาด';
  }
};

function render(data) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('content').style.display = 'block';
  document.getElementById('last-update').textContent =
    'อัปเดตล่าสุด: ' + new Date().toLocaleString('th-TH');

  const all  = data.totalAll || 0;
  const pend = data.totalPending || 0;
  const done = data.totalDone || 0;
  document.getElementById('total-all').textContent     = all;
  document.getElementById('total-pending').textContent = pend;
  document.getElementById('total-done').textContent    = done;
  document.getElementById('pct-done').textContent      =
    all > 0 ? Math.round(done / all * 100) + '% ของทั้งหมด' : '0%';

  const pendingList = data.pendingList || [];
  if (pendingList.length === 0) {
    document.getElementById('no-pending').style.display = 'block';
  } else {
    const el = document.getElementById('pending-list');
    pendingList.forEach(item => {
      el.innerHTML += `
        <div class="pending-item">
          <div class="dot"></div>
          <div style="flex:1">
            <div class="p-loc">${item.location}<span class="badge badge-p">งานค้าง</span></div>
            <div class="p-detail">${item.repairType} — ${item.repairNote || '-'}</div>
            <div class="p-date">แจ้งโดย ${item.userName} · ${formatDate(item.date)}</div>
          </div>
        </div>
      `;
    });
  }

  const zoneLabels = Object.keys(data.zoneData || {});
  const zoneValues = Object.values(data.zoneData || {});
  new Chart(document.getElementById('zoneChart'), {
    type: 'bar',
    data: {
      labels: zoneLabels.map(l => l.replace('Zone ', 'Z.')),
      datasets: [{ data: zoneValues, backgroundColor: '#378ADD', borderRadius: 4 }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        y: { beginAtZero: true, ticks: { stepSize: 1, font: { size: 10 } } },
        x: { ticks: { font: { size: 10 } } }
      }
    }
  });

  const typeLabels = Object.keys(data.typeData || {});
  const typeValues = Object.values(data.typeData || {});
  const colors = ['#378ADD','#1D9E75','#EF9F27','#7F77DD','#D4537E','#888780'];
  new Chart(document.getElementById('typeChart'), {
    type: 'doughnut',
    data: {
      labels: typeLabels,
      datasets: [{
        data: typeValues,
        backgroundColor: colors.slice(0, typeLabels.length),
        borderWidth: 2
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { position: 'bottom', labels: { font: { size: 10 }, boxWidth: 10, padding: 6 } } }
    }
  });

  const monthData   = data.monthData || {};
  const monthLabels = Object.keys(monthData);
  const barsEl      = document.getElementById('month-bars');
  monthLabels.forEach(m => {
    const row   = monthData[m];
    const total = row.total || 1;
    const donePct = Math.round(row.done / total * 100);
    const pendPct = Math.round(row.pending / total * 100);
    barsEl.innerHTML += `
      <div class="month-row">
        <div class="month-lbl">${m}</div>
        <div class="bar-wrap">
          <div class="bar-done" style="width:${donePct}%"></div>
          <div class="bar-pend" style="width:${pendPct}%"></div>
        </div>
        <div class="month-cnt">${row.total}</div>
      </div>
    `;
  });
}
</script>
</body>
</html>
