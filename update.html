<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>อัปเดตงาน</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Sarabun',sans-serif;background:#f0f4f0}
    .container{max-width:480px;margin:0 auto;padding:16px}
    .card{background:#fff;border-radius:16px;padding:20px;box-shadow:0 2px 12px rgba(0,0,0,0.1);margin-top:16px}
    .header{background:#1565C0;margin:-20px -20px 20px;padding:16px;text-align:center;border-radius:16px 16px 0 0;color:#fff}
    .header h1{font-size:18px;font-weight:bold;margin-top:4px}
    .info-box{background:#f5f5f5;border-radius:10px;padding:14px;margin-bottom:16px}
    .info-row{font-size:14px;margin-bottom:6px;color:#333}
    .info-row:last-child{margin-bottom:0}
    .label{font-size:13px;font-weight:bold;color:#333;margin-bottom:6px;display:block}
    textarea{width:100%;padding:11px;border:1.5px solid #ddd;border-radius:10px;font-size:14px;font-family:inherit;background:#fff;margin-bottom:14px;color:#333;height:80px;resize:none}
    textarea:focus{outline:none;border-color:#1565C0}
    .btn-done{width:100%;padding:14px;border:none;border-radius:10px;background:#2E7D32;color:#fff;cursor:pointer;font-size:16px;font-weight:bold;font-family:inherit}
    .btn-done:disabled{background:#aaa;cursor:not-allowed}
    .success-page{text-align:center;padding:32px 16px}
    .success-page .s-icon{font-size:56px;margin-bottom:12px}
    .success-page h2{font-size:20px;font-weight:bold;color:#2E7D32;margin-bottom:8px}
    .success-page p{font-size:14px;color:#666}
    .loading{text-align:center;padding:40px;color:#666;font-size:15px}
  </style>
</head>
<body>
<div class="container">
  <div class="card">
    <div class="header">
      <div style="font-size:28px">🔄</div>
      <h1>อัปเดตงาน</h1>
    </div>

    <div id="loading" class="loading">⏳ กำลังโหลด...</div>

    <div id="form-section" style="display:none">
      <div class="info-box" id="info-box"></div>
      <label class="label">📝 หมายเหตุ (ไม่บังคับ)</label>
      <textarea id="remark" placeholder="พิมพ์หมายเหตุ..."></textarea>
      <button class="btn-done" id="doneBtn" onclick="markDone()">✅ เสร็จสิ้น</button>
    </div>

    <div class="success-page" id="success-section" style="display:none">
      <div class="s-icon">✅</div>
      <h2>อัปเดตสำเร็จ!</h2>
      <p>งานถูกอัปเดตเรียบร้อยแล้ว<br>กำลังปิดหน้าต่าง...</p>
    </div>
  </div>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxqnahlgOcIiMey3_Lpz7tpuek_cQwcyIuW2gkuIT7GKpucx-BFkQVRmsPg0CE8yybB8w/exec';
const LIFF_ID = '2009967914-FVdcK4w2';

let rowId    = '';
let groupId  = '';
let userName = '';

window.onload = async () => {
  try { await liff.init({ liffId: LIFF_ID }); } catch(e) {}

  const params = new URLSearchParams(window.location.search);
  rowId   = params.get('rowId')   || '';
  groupId = params.get('groupId') || '';

  try {
    const profile = await liff.getProfile();
    userName = profile.displayName;
  } catch(e) {}

  if (!rowId) {
    document.getElementById('loading').textContent = '❌ ไม่พบข้อมูลงาน';
    return;
  }

  try {
    const res  = await fetch(GAS_URL + `?action=getRow&rowId=${encodeURIComponent(rowId)}`);
    const data = await res.json();
    if (data.status === 'ok' && data.row) {
      showInfo(data.row);
    } else {
      document.getElementById('loading').textContent = '❌ ไม่พบข้อมูลงาน';
    }
  } catch(e) {
    document.getElementById('loading').textContent = '❌ เกิดข้อผิดพลาด กรุณาลองใหม่';
  }
};

function showInfo(row) {
  document.getElementById('loading').style.display      = 'none';
  document.getElementById('form-section').style.display = 'block';

  const location = row.zone === 'Office'
    ? `🏢 Office: ${row.room}`
    : `🏠 ${row.zone} ห้อง ${row.room}`;

  document.getElementById('info-box').innerHTML = `
    <div class="info-row"><b>${location}</b></div>
    <div class="info-row">🔧 ${row.repairType}</div>
    <div class="info-row">📋 ${row.repairNote || '-'}</div>
    <div class="info-row">📝 ${row.detail}</div>
    <div class="info-row">📅 ${row.date}</div>
    <div class="info-row">👤 แจ้งโดย: ${row.userName}</div>
  `;
}

async function markDone() {
  const btn    = document.getElementById('doneBtn');
  const remark = document.getElementById('remark').value.trim();

  btn.disabled    = true;
  btn.textContent = 'กำลังอัปเดต...';

  try {
    await fetch(GAS_URL + `?action=markDone&rowId=${encodeURIComponent(rowId)}&userName=${encodeURIComponent(userName)}&groupId=${encodeURIComponent(groupId)}&remark=${encodeURIComponent(remark)}&workerUrl=${encodeURIComponent('https://repair-bot.kittipon233.workers.dev/')}`);

    document.getElementById('form-section').style.display  = 'none';
    document.getElementById('success-section').style.display = 'block';
    setTimeout(() => { try { liff.closeWindow(); } catch(e) {} }, 2000);
  } catch(e) {
    alert('เกิดข้อผิดพลาด กรุณาลองใหม่');
    btn.disabled    = false;
    btn.textContent = '✅ เสร็จสิ้น';
  }
}
</script>
</body>
</html>
