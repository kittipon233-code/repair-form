<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>อัปเดตงาน</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Sarabun',sans-serif;background:#f0f4f0}
    .container{max-width:480px;margin:0 auto;padding:16px}
    .card{background:#fff;border-radius:16px;padding:20px;box-shadow:0 2px 12px rgba(0,0,0,0.1);margin-top:16px}
    .header{background:#1565C0;margin:-20px -20px 20px;padding:16px;text-align:center;border-radius:16px 16px 0 0;color:#fff}
    .header h1{font-size:18px;font-weight:bold;margin-top:4px}
    .info-box{background:#f5f5f5;border-radius:10px;padding:14px;margin-bottom:16px}
    .info-row{display:flex;gap:8px;margin-bottom:6px;font-size:14px}
    .info-row:last-child{margin-bottom:0}
    .label{font-size:13px;font-weight:bold;color:#333;margin-bottom:6px;display:block}
    textarea,input[type=text]{width:100%;padding:11px;border:1.5px solid #ddd;border-radius:10px;font-size:14px;font-family:inherit;background:#fff;margin-bottom:14px;color:#333}
    textarea:focus,input:focus{outline:none;border-color:#1565C0}
    textarea{height:80px;resize:none}
    .upload-box{border:1.5px dashed #ddd;border-radius:10px;padding:16px;text-align:center;margin-bottom:14px;cursor:pointer;background:#fafafa}
    .upload-box input{display:none}
    .upload-preview{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
    .upload-preview img{width:80px;height:80px;object-fit:cover;border-radius:8px;border:1px solid #ddd}
    .btn-done{width:100%;padding:14px;border:none;border-radius:10px;background:#2E7D32;color:#fff;cursor:pointer;font-size:16px;font-weight:bold;font-family:inherit}
    .btn-done:disabled{background:#aaa;cursor:not-allowed}
    .success-page{display:none;text-align:center;padding:32px 16px}
    .success-page .s-icon{font-size:56px;margin-bottom:12px}
    .success-page h2{font-size:20px;font-weight:bold;color:#2E7D32;margin-bottom:8px}
    .success-page p{font-size:14px;color:#666}
    .loading{text-align:center;padding:40px;color:#666}
  </style>
</head>
<body>
<div class="container">
  <div class="card">
    <div class="header">
      <div style="font-size:28px">🔄</div>
      <h1>อัปเดตงาน</h1>
    </div>

    <div id="loading" class="loading">⏳ กำลังโหลด...</div>

    <div id="form-section" style="display:none">
      <div class="info-box" id="info-box"></div>

      <label class="label">📝 หมายเหตุ (ไม่บังคับ)</label>
      <textarea id="remark" placeholder="พิมพ์หมายเหตุ..."></textarea>

      <label class="label">📷 รูปภาพ (ไม่บังคับ สูงสุด 3 รูป)</label>
      <div class="upload-box" onclick="document.getElementById('imgInput').click()">
        <div style="font-size:24px">📷</div>
        <div style="font-size:13px;color:#888;margin-top:4px">กดเพื่อเลือกรูป</div>
        <input type="file" id="imgInput" accept="image/*" multiple onchange="previewImages(this)">
      </div>
      <div class="upload-preview" id="preview"></div>

      <button class="btn-done" id="doneBtn" onclick="markDone()">✅ เสร็จสิ้น</button>
    </div>

    <div class="success-page" id="success-section">
      <div class="s-icon">✅</div>
      <h2>อัปเดตสำเร็จ!</h2>
      <p>งานถูกอัปเดตเรียบร้อยแล้ว<br>กำลังปิดหน้าต่าง...</p>
    </div>
  </div>
</div>

<script>
const GAS_URL  = 'https://script.google.com/macros/s/AKfycbxqnahlgOcIiMey3_Lpz7tpuek_cQwcyIuW2gkuIT7GKpucx-BFkQVRmsPg0CE8yybB8w/exec';
const LIFF_ID  = '2009967914-L3U5ryzs';

let rowId    = '';
let groupId  = '';
let userName = '';
let selectedFiles = [];

window.onload = async () => {
  try { await liff.init({ liffId: LIFF_ID }); } catch(e) {}

  const params = new URLSearchParams(window.location.search);
  rowId   = params.get('rowId')   || '';
  groupId = params.get('groupId') || '';

  try {
    const profile = await liff.getProfile();
    userName = profile.displayName;
  } catch(e) {}

  // ดึงข้อมูลงานจาก GAS
  try {
    const res  = await fetch(GAS_URL + `?action=getRow&rowId=${rowId}`);
    const data = await res.json();
    if (data.status === 'ok' && data.row) {
      showInfo(data.row);
    } else {
      document.getElementById('loading').textContent = '❌ ไม่พบข้อมูลงาน';
    }
  } catch(e) {
    document.getElementById('loading').textContent = '❌ เกิดข้อผิดพลาด';
  }
};

function showInfo(row) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('form-section').style.display = 'block';

  const location = row.zone === 'Office'
    ? `🏢 Office: ${row.room}`
    : `🏠 ${row.zone} ห้อง ${row.room}`;

  document.getElementById('info-box').innerHTML = `
    <div class="info-row"><span>${location}</span></div>
    <div class="info-row"><span>🔧 ${row.repairType}</span></div>
    <div class="info-row"><span>📋 ${row.repairNote}</span></div>
    <div class="info-row"><span>📝 ${row.detail}</span></div>
    <div class="info-row"><span>📅 ${row.date}</span></div>
    <div class="info-row"><span>👤 แจ้งโดย: ${row.userName}</span></div>
  `;
}

function previewImages(input) {
  const files = Array.from(input.files).slice(0, 3);
  selectedFiles = files;
  const preview = document.getElementById('preview');
  preview.innerHTML = '';
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = document.createElement('img');
      img.src = e.target.result;
      preview.appendChild(img);
    };
    reader.readAsDataURL(file);
  });
}

async function uploadImages() {
  const urls = [];
  for (const file of selectedFiles) {
    const base64 = await toBase64(file);
    const res = await fetch(GAS_URL + `?type=uploadImage&fileName=${encodeURIComponent(file.name)}&mimeType=${encodeURIComponent(file.type)}`, {
      method: 'POST',
      body: base64.split(',')[1]
    });
    const data = await res.json();
    if (data.url) urls.push(data.url);
  }
  return urls;
}

function toBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload  = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function markDone() {
  const btn    = document.getElementById('doneBtn');
  const remark = document.getElementById('remark').value.trim();

  btn.disabled    = true;
  btn.textContent = 'กำลังอัปเดต...';

  let imageUrls = [];
  if (selectedFiles.length > 0) {
    btn.textContent = 'กำลังอัปโหลดรูป...';
    try { imageUrls = await uploadImages(); } catch(e) {}
  }

  try {
    await fetch(GAS_URL + `?action=markDone&rowId=${rowId}&userName=${encodeURIComponent(userName)}&groupId=${groupId}&remark=${encodeURIComponent(remark)}&imageUrls=${encodeURIComponent(imageUrls.join(','))}&workerUrl=${encodeURIComponent('https://repair-bot.kittipon233.workers.dev/')}`);

    document.getElementById('form-section').style.display  = 'none';
    document.getElementById('success-section').style.display = 'block';
    setTimeout(() => { try { liff.closeWindow(); } catch(e) {} }, 2000);
  } catch(e) {
    alert('เกิดข้อผิดพลาด กรุณาลองใหม่');
    btn.disabled    = false;
    btn.textContent = '✅ เสร็จสิ้น';
  }
}
</script>
</body>
</html>
